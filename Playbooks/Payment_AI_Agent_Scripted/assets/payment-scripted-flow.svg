<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-labelledby="title desc">
  <title id="title">Payment scripted AI Agent flow</title>
  <desc id="desc">A simple workflow showing caller, scripted AI Agent, Webex Contact Center voice flow, balance subflow, payment details collection, payment subflow, and result response.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#35506b"/>
    </marker>
    <style>
      .bg { fill: #f7f9fb; }
      .lane { fill: #ffffff; stroke: #d8e0e8; stroke-width: 1.5; }
      .box { fill: #ffffff; stroke: #6b8fb3; stroke-width: 2; rx: 14; }
      .agent { fill: #eef7ff; stroke: #3b82b6; }
      .flow { fill: #f3fbf6; stroke: #4b9a69; }
      .subflow { fill: #fff7eb; stroke: #c48630; }
      .end { fill: #f9eef1; stroke: #b85c71; }
      .title { font: 700 22px Arial, sans-serif; fill: #17324d; }
      .label { font: 700 15px Arial, sans-serif; fill: #17324d; }
      .small { font: 12px Arial, sans-serif; fill: #48627a; }
      .arrow { stroke: #35506b; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 7 6; }
    </style>
  </defs>
  <rect class="bg" width="1120" height="420"/>
  <text class="title" x="40" y="44">Hospital Payment Scripted AI Agent</text>
  <text class="small" x="40" y="68">Two supported paths: check balance, or check balance first and then make a payment.</text>

  <rect class="lane" x="40" y="96" width="1040" height="132" rx="18"/>
  <text class="label" x="64" y="123">Balance lookup</text>
  <rect class="box agent" x="70" y="148" width="170" height="50"/>
  <text class="label" x="100" y="178">Caller intent</text>
  <rect class="box agent" x="290" y="148" width="180" height="50"/>
  <text class="label" x="317" y="178">Collect identity</text>
  <rect class="box flow" x="520" y="148" width="180" height="50"/>
  <text class="label" x="543" y="178">State event</text>
  <rect class="box subflow" x="750" y="148" width="170" height="50"/>
  <text class="label" x="784" y="178">checkBalance</text>
  <rect class="box end" x="960" y="148" width="90" height="50"/>
  <text class="label" x="982" y="178">Reply</text>
  <path class="arrow" d="M240 173 H290"/>
  <path class="arrow" d="M470 173 H520"/>
  <path class="arrow" d="M700 173 H750"/>
  <path class="arrow" d="M920 173 H960"/>
  <text class="small" x="306" y="213">patientID + dateOfBirth</text>
  <text class="small" x="520" y="213">Payment_Balance_Response_custom_Event</text>
  <text class="small" x="750" y="213">returns balance + accountNumber</text>

  <rect class="lane" x="40" y="252" width="1040" height="132" rx="18"/>
  <text class="label" x="64" y="279">Make payment</text>
  <rect class="box agent" x="70" y="304" width="150" height="50"/>
  <text class="label" x="98" y="334">Make_Payment</text>
  <rect class="box subflow" x="260" y="304" width="155" height="50"/>
  <text class="label" x="291" y="334">checkBalance</text>
  <rect class="box agent" x="455" y="304" width="180" height="50"/>
  <text class="label" x="474" y="334">Collect payment</text>
  <rect class="box flow" x="675" y="304" width="165" height="50"/>
  <text class="label" x="704" y="334">State event</text>
  <rect class="box subflow" x="880" y="304" width="155" height="50"/>
  <text class="label" x="916" y="334">makePayment</text>
  <path class="arrow" d="M220 329 H260"/>
  <path class="arrow" d="M415 329 H455"/>
  <path class="arrow" d="M635 329 H675"/>
  <path class="arrow" d="M840 329 H880"/>
  <path class="arrow dash" d="M958 304 C958 250 610 244 610 199"/>
  <text class="small" x="255" y="369">verify balance first</text>
  <text class="small" x="459" y="369">CardNumber + CVV + expiryDate</text>
  <text class="small" x="668" y="369">collectPaymentDetails_customEvent</text>
  <text class="small" x="862" y="369">returns paymentResultResponse</text>
</svg>
