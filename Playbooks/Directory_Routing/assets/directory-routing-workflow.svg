<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title>Directory Routing Workflow</title>
  <desc>Workflow showing same-size components for caller, call flow, AI Agent, Directory knowledge base beneath the AI Agent, transfer, and final destination as a person or department.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="flowFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="agentFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f7ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="kbFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eefaf2"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="transferFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="destinationFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7e8"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#1f6feb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#15803d"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #475569; }
      .card-title { font: 700 17px Arial, sans-serif; fill: #172033; }
      .card-label { font: 700 11px Arial, sans-serif; fill: #64748b; letter-spacing: 0; }
      .body { font: 400 13px Arial, sans-serif; fill: #334155; }
      .small { font: 400 12px Arial, sans-serif; fill: #475569; }
      .connector { stroke: #1f6feb; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .kb-query { stroke: #15803d; stroke-width: 2.6; fill: none; marker-end: url(#arrowGreen); }
      .kb-response { stroke: #15803d; stroke-width: 2.6; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrowGreen); }
    </style>
  </defs>

  <rect width="1280" height="620" fill="url(#pageBg)"/>
  <text x="640" y="46" text-anchor="middle" class="title">Directory Routing Workflow</text>
  <text x="640" y="72" text-anchor="middle" class="subtitle">Caller request to AI lookup to transfer destination</text>

  <line x1="70" y1="241" x2="1210" y2="241" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="5 7"/>

  <!-- Caller -->
  <g filter="url(#softShadow)">
    <rect x="76" y="146" width="176" height="190" rx="16" fill="#ffffff" stroke="#dbeafe" stroke-width="1.6"/>
    <circle cx="164" cy="196" r="31" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="164" cy="185" r="9" fill="#1f6feb"/>
    <path d="M145 215 C149 202, 179 202, 183 215" fill="#1f6feb"/>
    <text x="164" y="257" text-anchor="middle" class="card-label">CALLER</text>
    <text x="164" y="282" text-anchor="middle" class="card-title">Caller</text>
    <text x="164" y="306" text-anchor="middle" class="body">Person or</text>
    <text x="164" y="324" text-anchor="middle" class="body">department request</text>
  </g>

  <path d="M252 241 L294 241" class="connector"/>

  <!-- Call Flow -->
  <g filter="url(#softShadow)">
    <rect x="304" y="146" width="176" height="190" rx="16" fill="url(#flowFill)" stroke="#c7d2fe" stroke-width="1.6"/>
    <rect x="346" y="176" width="92" height="48" rx="9" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.4"/>
    <path d="M367 206 C361 196, 362 189, 368 183 L376 190 C374 194, 375 199, 380 204 C385 209, 391 211, 395 208 L403 216 C397 222, 390 223, 380 218 C374 215, 370 211, 367 206 Z" fill="#4f46e5"/>
    <path d="M414 190 L430 190 L430 210 L414 210 Z" fill="#4f46e5" opacity="0.2"/>
    <path d="M420 196 L426 200 L420 204 Z" fill="#4f46e5"/>
    <text x="392" y="257" text-anchor="middle" class="card-label">WEBEX CC</text>
    <text x="392" y="282" text-anchor="middle" class="card-title">Call Flow</text>
    <text x="392" y="306" text-anchor="middle" class="body">Receives and</text>
    <text x="392" y="324" text-anchor="middle" class="body">anchors the call</text>
  </g>

  <path d="M480 241 L522 241" class="connector"/>

  <!-- AI Agent -->
  <g filter="url(#softShadow)">
    <rect x="532" y="146" width="176" height="190" rx="16" fill="url(#agentFill)" stroke="#7dd3fc" stroke-width="1.6"/>
    <circle cx="620" cy="196" r="31" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
    <path d="M605 198 C598 191, 601 179, 611 178 C616 169, 629 171, 632 181 C641 184, 644 196, 636 202 C638 212, 624 218, 618 210 C609 213, 601 207, 605 198 Z" fill="#0284c7" opacity="0.23"/>
    <circle cx="612" cy="193" r="3" fill="#0284c7"/>
    <circle cx="624" cy="188" r="3" fill="#0284c7"/>
    <circle cx="632" cy="201" r="3" fill="#0284c7"/>
    <path d="M612 193 L624 188 L632 201 L620 209" stroke="#0284c7" stroke-width="2" fill="none"/>
    <text x="620" y="257" text-anchor="middle" class="card-label">AUTONOMOUS</text>
    <text x="620" y="282" text-anchor="middle" class="card-title">AI Agent</text>
    <text x="620" y="306" text-anchor="middle" class="body">Classifies and</text>
    <text x="620" y="324" text-anchor="middle" class="body">queries directory</text>
  </g>

  <!-- Knowledge Base below AI Agent -->
  <g filter="url(#softShadow)">
    <rect x="532" y="390" width="176" height="190" rx="16" fill="url(#kbFill)" stroke="#86efac" stroke-width="1.6"/>
    <ellipse cx="620" cy="429" rx="42" ry="14" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
    <path d="M578 429 L578 473 C578 481, 662 481, 662 473 L662 429" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
    <ellipse cx="620" cy="473" rx="42" ry="14" fill="#bbf7d0" stroke="#22c55e" stroke-width="1.5"/>
    <path d="M592 452 L648 452" stroke="#16a34a" stroke-width="2" opacity="0.55"/>
    <text x="620" y="501" text-anchor="middle" class="card-label">DIRECTORY</text>
    <text x="620" y="526" text-anchor="middle" class="card-title">Knowledge Base</text>
    <text x="620" y="550" text-anchor="middle" class="body">Returns the</text>
    <text x="620" y="568" text-anchor="middle" class="body">phone number</text>
  </g>

  <path d="M601 336 C584 354, 584 367, 601 390" class="kb-query"/>
  <text x="550" y="365" class="small">query</text>
  <path d="M639 390 C656 367, 656 354, 639 336" class="kb-response"/>
  <text x="664" y="365" class="small">number</text>

  <path d="M708 241 L750 241" class="connector"/>

  <!-- Transfer -->
  <g filter="url(#softShadow)">
    <rect x="760" y="146" width="176" height="190" rx="16" fill="url(#transferFill)" stroke="#bfdbfe" stroke-width="1.6"/>
    <circle cx="848" cy="196" r="31" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
    <path d="M830 196 L853 181 L853 191 L866 191 L866 201 L853 201 L853 211 Z" fill="#1f6feb"/>
    <text x="848" y="257" text-anchor="middle" class="card-label">ROUTING</text>
    <text x="848" y="282" text-anchor="middle" class="card-title">Transfer</text>
    <text x="848" y="306" text-anchor="middle" class="body">Connects the</text>
    <text x="848" y="324" text-anchor="middle" class="body">active call</text>
  </g>

  <path d="M936 241 L978 241" class="connector"/>

  <!-- Destination -->
  <g filter="url(#softShadow)">
    <rect x="988" y="146" width="176" height="190" rx="16" fill="url(#destinationFill)" stroke="#facc15" stroke-width="1.6"/>
    <text x="1076" y="186" text-anchor="middle" class="card-label">DESTINATION</text>
    <rect x="1012" y="203" width="128" height="38" rx="19" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.4"/>
    <text x="1076" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#92400e">Person</text>
    <rect x="1012" y="252" width="128" height="38" rx="19" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.4"/>
    <text x="1076" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#92400e">Department</text>
    <text x="1076" y="318" text-anchor="middle" class="small">Requested contact</text>
  </g>
</svg>
