<text x="64.00" y="150.00" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#1e1e1e" text-anchor="start"><tspan x="64.00" dy="22.00">Common Start</tspan></text>
<text x="149.50" y="219.00" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#1e1e1e" text-anchor="middle"><tspan x="149.50" dy="15.00">Caller calls</tspan><tspan x="149.50" dy="18.00">hospital line</tspan></text>
<text x="372.00" y="219.00" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle"><tspan x="372.00" dy="14.00">Voice flow starts</tspan><tspan x="372.00" dy="16.80">AI Agent activity</tspan></text>
<text x="620.50" y="211.00" font-family="&quot;Cascadia Code&quot;, Menlo, Consolas, monospace" font-size="13" fill="#1e1e1e" text-anchor="middle"><tspan x="620.50" dy="13.00">state_update</tspan><tspan x="620.50" dy="15.60">intent=Identify_Department</tspan></text>
<text x="887.50" y="211.00" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1e1e1e" text-anchor="middle"><tspan x="887.50" dy="14.00">Identify_Department</tspan><tspan x="887.50" dy="16.80">collect departmentName</tspan></text>
<text x="1162.50" y="211.00" font-family="&quot;Cascadia Code&quot;, Menlo, Consolas, monospace" font-size="14" fill="#1e1e1e" text-anchor="middle"><tspan x="1162.50" dy="14.00">Confirm department</tspan><tspan x="1162.50" dy="16.80">${entity.departmentName}</tspan></text>
<text x="42.00" y="347.00" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#1e1e1e" text-anchor="start"><tspan x="42.00" dy="22.00">Outcome Paths Returned From The AI Agent</tspan></text>
<text x="64.00" y="414.00" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1e1e1e" text-anchor="start"><tspan x="64.00" dy="18.00">Success Path</tspan></text>
<text x="342.50" y="436.00" font-family="&quot;Cascadia Code&quot;, Menlo, Consolas, monospace" font-size="13" fill="#1e1e1e" text-anchor="middle"><tspan x="342.50" dy="13.00">Yes custom event</tspan><tspan x="342.50" dy="15.60">MetaData.departmentName</tspan></text>
<text x="590.00" y="436.00" font-family="&quot;Cascadia Code&quot;, Menlo, Consolas, monospace" font-size="13" fill="#1e1e1e" text-anchor="middle"><tspan x="590.00" dy="13.00">Case_State_event</tspan><tspan x="590.00" dy="15.60">StateEventName = Yes</tspan></text>
<text x="830.00" y="436.00" font-family="&quot;Cascadia Code&quot;, Menlo, Consolas, monospace" font-size="13" fill="#1e1e1e" text-anchor="middle"><tspan x="830.00" dy="13.00">Parse_department_name</tspan><tspan x="830.00" dy="15.60">read MetaData</tspan></text>
<text x="1092.50" y="436.00" font-family="&quot;Cascadia Code&quot;, Menlo, Consolas, monospace" font-size="13" fill="#1e1e1e" text-anchor="middle"><tspan x="1092.50" dy="13.00">QueueContact_e4i_d6h</tspan><tspan x="1092.50" dy="15.60">queueName = departmentName</tspan></text>
<text x="1307.50" y="436.00" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1e1e1e" text-anchor="middle"><tspan x="1307.50" dy="13.00">Caller reaches</tspan><tspan x="1307.50" dy="15.60">department</tspan></text>
<text x="1145.00" y="327.00" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#2f9e44" text-anchor="middle"><tspan x="1145.00" dy="13.00">Yes</tspan></text>
<text x="64.00" y="575.00" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1e1e1e" text-anchor="start"><tspan x="64.00" dy="18.00">Retry Path</tspan></text>
<text x="342.50" y="598.00" font-family="&quot;Cascadia Code&quot;, Menlo, Consolas, monospace" font-size="13" fill="#1e1e1e" text-anchor="middle"><tspan x="342.50" dy="13.00">No custom event</tspan><tspan x="342.50" dy="15.60">reset slots enabled</tspan></text>
<text x="590.00" y="598.00" font-family="&quot;Cascadia Code&quot;, Menlo, Consolas, monospace" font-size="13" fill="#1e1e1e" text-anchor="middle"><tspan x="590.00" dy="13.00">Case_State_event</tspan><tspan x="590.00" dy="15.60">StateEventName = No</tspan></text>
<text x="830.00" y="598.00" font-family="&quot;Cascadia Code&quot;, Menlo, Consolas, monospace" font-size="13" fill="#1e1e1e" text-anchor="middle"><tspan x="830.00" dy="13.00">incrementCounter</tspan><tspan x="830.00" dy="15.60">counter = 1</tspan></text>
<text x="1092.50" y="591.00" font-family="&quot;Cascadia Code&quot;, Menlo, Consolas, monospace" font-size="12" fill="#1e1e1e" text-anchor="middle"><tspan x="1092.50" dy="12.00">findDepartmentAgain</tspan><tspan x="1092.50" dy="14.40">state_update + context</tspan><tspan x="1092.50" dy="14.40">5 turns</tspan></text>
<text x="1307.50" y="598.00" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1e1e1e" text-anchor="middle"><tspan x="1307.50" dy="13.00">Ask for</tspan><tspan x="1307.50" dy="15.60">department again</tspan></text>
<text x="1089.00" y="512.00" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#f59f00" text-anchor="middle"><tspan x="1089.00" dy="13.00">No once</tspan></text>
<text x="64.00" y="745.00" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1e1e1e" text-anchor="start"><tspan x="64.00" dy="18.00">Escalation Path</tspan></text>
<text x="342.50" y="768.00" font-family="&quot;Cascadia Code&quot;, Menlo, Consolas, monospace" font-size="13" fill="#1e1e1e" text-anchor="middle"><tspan x="342.50" dy="13.00">Second No event</tspan><tspan x="342.50" dy="15.60">slots clear again</tspan></text>
<text x="590.00" y="768.00" font-family="&quot;Cascadia Code&quot;, Menlo, Consolas, monospace" font-size="13" fill="#1e1e1e" text-anchor="middle"><tspan x="590.00" dy="13.00">counter = 2</tspan><tspan x="590.00" dy="15.60">max reached</tspan></text>
<text x="830.00" y="761.00" font-family="&quot;Cascadia Code&quot;, Menlo, Consolas, monospace" font-size="12" fill="#1e1e1e" text-anchor="middle"><tspan x="830.00" dy="12.00">No_response</tspan><tspan x="830.00" dy="14.40">eventDataJson</tspan><tspan x="830.00" dy="14.40">escalate=yes</tspan></text>
<text x="1092.50" y="768.00" font-family="&quot;Cascadia Code&quot;, Menlo, Consolas, monospace" font-size="13" fill="#1e1e1e" text-anchor="middle"><tspan x="1092.50" dy="13.00">AI Agent sends</tspan><tspan x="1092.50" dy="15.60">customEscalation</tspan></text>
<text x="1307.50" y="768.00" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1e1e1e" text-anchor="middle"><tspan x="1307.50" dy="13.00">Live-agent</tspan><tspan x="1307.50" dy="15.60">assistance</tspan></text>
