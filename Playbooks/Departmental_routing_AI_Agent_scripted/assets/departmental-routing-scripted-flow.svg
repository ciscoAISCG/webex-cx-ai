<text x="42.00" y="82.00" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#495057" text-anchor="start"><tspan x="42.00" dy="14.00">Common start, then three clear outcomes: route to department, retry once, or escalate after two No responses.</tspan></text>
<text x="1115.00" y="49.00" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle"><tspan x="1115.00" dy="12.00">Caller</tspan></text>
