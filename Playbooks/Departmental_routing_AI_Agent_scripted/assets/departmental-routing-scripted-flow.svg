<text x="64.00" y="910.00" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1e1e1e" text-anchor="start"><tspan x="64.00" dy="18.00">Key Checks</tspan></text>
<text x="347.50" y="931.00" font-family="&quot;Cascadia Code&quot;, Menlo, Consolas, monospace" font-size="12" fill="#1e1e1e" text-anchor="middle"><tspan x="347.50" dy="12.00">StateEventName drives the case node</tspan></text>
<text x="622.50" y="931.00" font-family="&quot;Cascadia Code&quot;, Menlo, Consolas, monospace" font-size="12" fill="#1e1e1e" text-anchor="middle"><tspan x="622.50" dy="12.00">MetaData.departmentName becomes queueName</tspan></text>
